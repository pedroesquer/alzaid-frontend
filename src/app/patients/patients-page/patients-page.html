<div class="patients-layout">
  <app-sidebar></app-sidebar>

  <main class="content">
    <div class="content-inner">
      <div class="d-flex align-items-center justify-content-between gap-3 mb-3">
        <div class="search-wrap flex-grow-1">
          <div class="input-group">
            <span class="input-group-text bg-white border-end-0">🔎</span>
            <input
              class="form-control border-start-0"
              placeholder="Buscar por nombre, ID o padecimiento..."
              [(ngModel)]="searchTerm"
            />
          </div>
        </div>

        <button class="btn btn-success rounded-pill px-4" (click)="onAddPatient()">
          + Agregar Paciente
        </button>
      </div>

      <div class="card shadow-sm border-0">
        <div class="table-responsive">
          <table class="table align-middle mb-0">
            <thead class="table-head">
              <tr>
                <th class="ps-4">PERFIL</th>
                <th>ID</th>
                <th>NOMBRE COMPLETO</th>
                <th>EDAD</th>
                <th>TIPO DEMENCIA</th>
                <th>ETAPA</th>
                <th>PESO</th>
                <th>ALTURA</th>
                <th class="text-center pe-4">ACCIONES</th>
              </tr>
            </thead>

            <tbody>
              <tr *ngFor="let p of filteredPatients">
                <td class="ps-4">
                  <div class="avatar placeholder-avatar">
                    {{ p.fullName.charAt(0) }}
                  </div>
                </td>

                <td>
                  <span class="badge rounded-pill bg-info-subtle text-info-emphasis">
                    {{ p._id }}
                  </span>
                </td>

                <td class="fw-semibold">{{ p.fullName }}</td>
                <td>{{ p.age }} años</td>
                <td>{{ p.dementiaType }}</td>

                <td>
                  <span class="badge rounded-pill" [ngClass]="stageBadgeClass(p.dementiaStage)">
                    {{ p.dementiaStage }}
                  </span>
                </td>

                <td>{{ p.weight }}</td>
                <td>{{ p.height }}</td>

                <td class="text-center pe-4">
                  <div class="d-inline-flex gap-2">
                    <button class="btn btn-light btn-sm icon-btn" (click)="onView(p)" title="Ver">
                      👁️
                    </button>
                    <button class="btn btn-light btn-sm icon-btn" (click)="onEdit(p)" title="Editar">
                      ✏️
                    </button>
                    <button class="btn btn-light btn-sm icon-btn danger" (click)="onDelete(p)" title="Eliminar">
                      🗑️
                    </button>
                  </div>
                </td>
              </tr>

              <tr *ngIf="filteredPatients.length === 0">
                <td colspan="9" class="text-center py-5 text-muted">
                  No hay resultados para “{{ searchTerm }}”
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </main>

  <app-new-patient
    *ngIf="showNewPatientForm"
    (cerrar)="closeNewPatientModal()">
  </app-new-patient>
</div>
